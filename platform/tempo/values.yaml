# ──────────────────────────────────────────────────────────────────────────────
# Values for the Tempo chart (community edition).
#
# Chart source:    https://github.com/grafana-community/helm-charts/tree/main/charts/tempo
# Upstream values: helm show values grafana-community/tempo --version 2.1.2
#
# What this chart installs (with our overrides):
#   - One Tempo StatefulSet in SingleBinary mode.
#   - A PVC for traces and WAL.
#   - A Service exposing all of Tempo's default receiver ports.
#     We accept this; OTLP-only intent is enforced by the OTEL collector's
#     exporter config (wave 2), not by Tempo's receiver list.
#
# What this chart does NOT install:
#   - No memcached, no gateway, no canary, no metrics-generator.
#
# Why we don't override `tempo.receivers`:
#   The chart's service.yaml template walks .Values.tempo.receivers.jaeger.*
#   unconditionally. Setting jaeger: null or {} causes a nil-pointer error
#   during render. Selectively nulling subkeys doesn't disable the ports.
#   The cost of fighting this isn't worth the benefit (4 unused listeners,
#   minimal resource cost). Accept the default; rely on OTEL collector to
#   send traces only via OTLP.
#
# Inherited from chart defaults (verified, not overridden):
#   - replicas: 1
#   - tempo.multitenancyEnabled: false
#   - tempo.metricsGenerator.enabled: false
#   - tempo.storage.trace.backend: local with /var/tempo/{traces,wal}
#   - tempo.receivers: all (jaeger, opencensus, otlp) — see note above
#   - persistence.size: 10Gi
#   - persistence.accessModes: [ReadWriteOnce]
# ──────────────────────────────────────────────────────────────────────────────

tempo:
  # Phone-home off, same discipline as Loki and VM.
  reportingEnabled: false

  # Retention: 30 days, symmetric with Loki and VMSingle.
  retention: 720h

  # Resource sizing for the Tempo pod.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

# Enable persistence so traces survive pod restarts.
persistence:
  enabled: true