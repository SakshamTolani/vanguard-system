apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/SakshamTolani/vanguard-system.git
    targetRevision: HEAD
    path: platform/manifests  # We will put our DBs and Namespaces here
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd # Child apps are usually managed in the argocd namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true