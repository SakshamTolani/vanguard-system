apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-postgres
  namespace: temporal
spec:
  instances: 1

  # PG 16 — current stable, well-supported by CNPG and Temporal.
  imageName: ghcr.io/cloudnative-pg/postgresql:16

  bootstrap:
    initdb:
      database: temporal
      owner: temporal
      postInitSQL:
        - CREATE DATABASE temporal_visibility OWNER temporal;

  storage:
    size: 10Gi

  # Modest sizing for learning cluster.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi