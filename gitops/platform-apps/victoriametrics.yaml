# ──────────────────────────────────────────────────────────────────────────────
# ArgoCD Application: victoriametrics
#
# Applies VMSingle (the database), VMAgent (the scraper), and VMServiceScrape
# CRs (the scrape targets). All managed by vm-operator (wave 0).
#
# Wave 1: this Application produces the metrics sink that wave 2 components
# (OTEL collector, Grafana) will consume.
#
# Pattern: source.path points at a directory; ArgoCD applies every YAML in it.
# Same approach as platform-root's app-of-apps.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoriametrics
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default

  source:
    repoURL: https://github.com/SakshamTolani/vanguard-system.git
    targetRevision: main
    path: platform/victoriametrics
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true