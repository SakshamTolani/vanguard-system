# ──────────────────────────────────────────────────────────────────────────────
# ArgoCD Application: grafana
#
# Deploys Grafana with three datasources pre-configured to query the
# observability sinks. Wave 2: depends on all three Wave 1 sinks being up
# (Loki, VMSingle, Tempo). Without them, datasources show as "down" in the UI.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  sources:
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: grafana
      targetRevision: 12.3.3
      helm:
        valueFiles:
          - $values/platform/grafana/values.yaml

    - repoURL: https://github.com/SakshamTolani/vanguard-system.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true