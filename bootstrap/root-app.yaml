apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: food-delivery-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SakshamTolani/vanguard-system.git
    targetRevision: HEAD
    path: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: vanguard-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true